family: flow_matching
task: chiplet_flow_gcn
num_classes: 10
method: chiplet_fm_eval_guidance_smoke
seed: 61
log_dir: logs/chiplet_fm
from_checkpoint: chiplet_flow_gcn.chiplet_fm.61/latest.ckpt
param_sweep: false
logger:
  filter: .*
  wandb: false
  wandb_entity: <your name here>
  wandb_project: <your project here>
implementation: custom
model:
  mask_key: is_ports
  use_mask_as_input: true
  max_diffusion_steps: 1000
  noise_schedule: cosine
  t_encoding_type: sinusoid
  t_encoding_dim: 32
  beta_1: 0.0001
  beta_T: 0.02
  backbone: att_gnn
  backbone_params:
    edge_features: 4
    cond_node_features: 2
    hidden_size: 64
    hidden_node_features:
    - 64
    - 64
    attention_node_features:
    - 32
    - 32
    layers_per_block: 2
    input_encoding_dim: 32
    dropout: 0.0
    num_heads: 4
    mlp_num_layers: 2
    mlp_size_factor: 4
    ff_num_layers: 2
    ff_size_factor: 1
    att_implementation: flash
    dir_att_input: true
    conv_params:
      layer_type: gat
      heads: 4
      concat: true
    in_node_features: 2
    out_node_features: 2
    t_encoding_dim: 32
    device: cpu
    mask_key: is_ports
  guidance_mode: sgd
  legality_guidance_weight: 3.0
  hpwl_guidance_weight: 0.0
  guidance_step: 1000
  forward_guidance_weight: 0.0
  grad_descent_steps: 10
  grad_descent_rate: 0.5
  self_recursion_steps: 10
  legality_softmax_factor_min: 10.0
  legality_softmax_factor_max: 10.0
  legality_softmax_critical_factor: 0.0
  num_classes: 10
  input_shape:
  - 12
  - 2
  device: cpu
cluster:
  is_cluster: false
  num_clusters: 512
  verbose: false
  cached_clusters: false
legalization:
  mode: none
  softmax_min: 5.0
  softmax_max: 50.0
val_batch_size: 64
sc_halo: 1.0
macros_only: false
cached_macros: false
eval_samples: 0
eval_policy_algorithm: open_loop
eval_policy:
  num_iterations: 5
  num_clusters: 512
  sc_placement_algorithm: sgd
  verbose: false
  save_plots: false
  save_videos: false
  sc_placement_params:
    lr: 0.02
    grad_descent_steps: 128
    legality_guidance_weight: 0.0
    hpwl_guidance_weight: 1.0
    softmax_min: 5.0
    softmax_max: 50.0
edge_dropout: 0
scatter_plots:
- - lambda_2
  - legality_2
- - lambda_2
  - hpwl_ratio
- - hpwl_ratio
  - legality_2
- - original_hpwl_normalized
  - hpwl_normalized
show_intermediate_every: 20
num_output_samples: 1
train_data_limit: none
val_data_limit: 1
num_params: 233474
train_dataset: 3739
val_dataset: 1
