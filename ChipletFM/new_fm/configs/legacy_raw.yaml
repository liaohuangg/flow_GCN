dataset:
  path: new_fm/dataset/dataset.pkl
  seed: 123
  train_max_samples: null
  val_max_samples: null
  test_max_samples: 128

model:
  name: legacy_fm
  backbone: att_gnn
  backbone_params:
    edge_features: 4
    cond_node_features: 2
    hidden_size: 128
    hidden_node_features: [256, 256]
    attention_node_features: [32, 32]
    layers_per_block: 2
    input_encoding_dim: 32
    dropout: 0.0
    num_heads: 4
    mlp_num_layers: 2
    mlp_size_factor: 4
    ff_num_layers: 2
    ff_size_factor: 1
    att_implementation: flash
    dir_att_input: true
    conv_params:
      layer_type: gat
      heads: 4
      concat: true
  mask_key: is_ports
  use_mask_as_input: true
  max_diffusion_steps: 200
  t_encoding_type: sinusoid
  t_encoding_dim: 32
  fm_t_min: 0.0001

train:
  batch_size: 16
  legacy_single_graph_batch: true
  epochs: 50
  max_steps: 30000
  lr: 0.0003
  weight_decay: 0.0
  log_every: 100
  output_dir: new_fm/log/legacy_raw
  device: auto
  seed: 123

sampling:
  steps: 200
  eval_num: 128
  out_num: 16
